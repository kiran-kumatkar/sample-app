name: CI - Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: kirankumatkar217/sample-app

jobs:
  # ─── JOB 1: BUILD AND PUSH IMAGE ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from git SHA
        id: set-tag
        run: |
          TAG="v1.0.0-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag will be: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}"

  # ─── JOB 2: UPDATE GITOPS CONFIG REPO ───────────────────────────────────
  update-gitops:
    name: Update GitOps Config Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout gitops-config repo
        uses: actions/checkout@v4
        with:
          repository: kiran-kumatkar/gitops-config
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Update image tag in dev deployment
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image-tag }}
          echo "Updating dev deployment to image tag: ${NEW_TAG}"

          sed -i "s|image: kirankumatkar217/sample-app:.*|image: kirankumatkar217/sample-app:${NEW_TAG}|g" \
            environments/dev/deployment.yaml

          grep "image:" environments/dev/deployment.yaml

      - name: Update image tag in staging values
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image-tag }}
          echo "Updating staging values to image tag: ${NEW_TAG}"

          sed -i "s|tag:.*|tag: \"${NEW_TAG}\"|g" \
            environments/staging/values.yaml

          grep "tag:" environments/staging/values.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add environments/dev/deployment.yaml
          git add environments/staging/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: bump image tag to ${{ needs.build-and-push.outputs.image-tag }}

            Triggered by: ${{ github.repository }}@${{ github.sha }}
            Author: ${{ github.actor }}"
            git push
            echo "GitOps config updated successfully"
          fi